# Chain: Discussion Only
# CC and Codex discuss a topic (UX, architecture, strategy) without code review.
# No writers, no merge — just structured multi-round discussion.
# Uses discussion-standalone step (NOT discussion step — that requires a Comparator).
# Usage: chain_template: discussion-only
#   topic: "Should we merge Contacts into Settings?"
#   budget_per_step: 3
name: Discussion Only
steps:
  - step: discussion-standalone
    budget_multiplier: 1.5
