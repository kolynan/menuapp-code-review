# Chain: Discussion CC+Codex LEAN (Cowork-synthesis)
# Same as discussion-cc-codex but synthesizer step REMOVED — Cowork agent
# synthesizes the two writer positions interactively with Arman in chat.
#
# Why: synthesizer step costs ~6 min + $1-2 and produces a static report that
# Arman re-reads and re-discusses anyway. Cowork doing it live is faster,
# cheaper, and produces a tailored decision.
#
# Both writers use `group: writers` → run in parallel (no page-lock conflict
# because both are read-only review tasks).
#
# Usage: chain_template: discussion-cc-codex-lean
#   topic: "Should we use toast or bottom sheet for free plan gate?"
#   budget_per_step: 3
#
# After TG DONE for both writers:
#   1. Cowork reads pipeline/chain-state/<chain-id>-cc-position.md
#   2. Cowork reads pipeline/chain-state/<chain-id>-codex-position.md
#   3. Cowork presents both perspectives to Arman + recommends a synthesis
#   4. Arman picks → Cowork records decision (BACKLOG / DECISIONS_INDEX)
#
# Created S281 (2026-04-15) — BACKLOG #332.
name: Discussion CC+Codex LEAN
steps:
  - step: discussion-writer-cc
    group: writers
    budget_multiplier: 1.0
  - step: discussion-writer-codex
    group: writers
    budget_multiplier: 1.0
    runner: codex
