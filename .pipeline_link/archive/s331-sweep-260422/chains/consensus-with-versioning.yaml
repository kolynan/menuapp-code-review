# Chain: Consensus Review with Discussion + Versioning
# Copy of consensus-with-discussion (S5) with safe git tag before merge.
# Creates a pre-fix git tag for instant rollback if fixes are problematic.
# Use when applying fixes to production-critical pages.
# Usage: chain_template: consensus-with-versioning
name: Consensus Review with Discussion + Versioning
steps:
  - step: cc-writer
    group: writers
    budget_multiplier: 1.0
  - step: codex-writer
    group: writers
    budget_multiplier: 1.0
    runner: codex
  - step: comparator
    budget_multiplier: 0.5
  - step: discussion
    budget_multiplier: 1.0
  - step: merge-with-tag
    budget_multiplier: 0.5
