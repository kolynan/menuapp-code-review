# Chain: Consensus Review with Discussion
# Same as consensus but adds Discussion step to resolve disputes before merge.
# Use when disputes are likely (complex code, architectural decisions).
# Usage: chain_template: consensus-with-discussion
name: Consensus Review with Discussion
steps:
  - step: cc-writer
    group: writers
    budget_multiplier: 1.0
  - step: codex-writer
    group: writers
    budget_multiplier: 1.0
    runner: codex
  - step: comparator
    budget_multiplier: 0.5
  - step: discussion
    budget_multiplier: 1.0
  - step: merge
    budget_multiplier: 0.5
