# Chain: Consensus Review with Discussion v2 (CC-Only Discussion)
# Same as consensus-with-discussion but uses CC-only discussion step.
# Eliminates 40+ min Codex CLI delays in discussion. CC resolves disputes solo.
# Fallback: use original `consensus-with-discussion` if CC-only discussion is insufficient.
# Usage: chain_template: consensus-with-discussion-v2
# Updated S228: codex-writer → codex-writer-v2 (KB-121 fix: git reset before review)
#               merge → merge-v2 (KB-121 fix: file integrity check before applying)
# Updated S234: merge-v2 multiplier raised 0.5→1.0 (KB-122: large file merge needs full budget)
name: Consensus Review with Discussion v2
steps:
  - step: cc-writer
    group: writers
    budget_multiplier: 1.0
  - step: codex-writer-v2
    group: writers
    budget_multiplier: 1.0
    runner: codex
  - step: comparator
    budget_multiplier: 0.5
  - step: discussion-cc-only
    budget_multiplier: 0.5
  - step: merge-v2
    budget_multiplier: 1.0
