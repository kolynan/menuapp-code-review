# Chain: Consensus Review
# Full CC + Codex independent analysis → comparison → merge
# Steps with same group run in parallel
# Expected: ~5-7 min (writers parallel), was ~12-20 min (sequential)
# For discussion of disputes, use chain_template: consensus-with-discussion
name: Consensus Review
steps:
  - step: cc-writer
    group: writers
    budget_multiplier: 1.0
  - step: codex-writer
    group: writers
    budget_multiplier: 1.0
    runner: codex
  - step: comparator
    budget_multiplier: 0.5
  - step: merge
    budget_multiplier: 0.5
