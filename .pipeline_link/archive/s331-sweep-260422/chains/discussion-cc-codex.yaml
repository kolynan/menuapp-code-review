# Chain: Discussion CC+Codex
# CC and Codex independently analyze questions, then synthesizer combines positions.
# Architecture mirrors S5v2 consensus pattern: parallel writers + synthesizer.
# Replaces discussion-only (which relied on CC calling codex.cmd — unreliable).
# Usage: chain_template: discussion-cc-codex
#   topic: "Should we use toast or bottom sheet for free plan gate?"
#   budget_per_step: 3
# Created S256 (2026-04-13)
name: Discussion CC+Codex
steps:
  - step: discussion-writer-cc
    group: writers
    budget_multiplier: 1.0
  - step: discussion-writer-codex
    group: writers
    budget_multiplier: 1.0
    runner: codex
  - step: discussion-synthesizer
    budget_multiplier: 0.5
