# Chain: ПССК Review (CC + Codex parallel)
# Both CC and Codex review the quality of a КС implementation prompt simultaneously.
# No code changes — pure prompt quality review.
# Usage: chain_template: pssk-review
# Single queue file → expands into 2 parallel steps → both reviewers run in ~5 min
name: ПССК Review
steps:
  - step: pssk-cc-reviewer
    group: reviewers
    budget_multiplier: 1.0
  - step: pssk-codex-reviewer
    group: reviewers
    budget_multiplier: 1.0
    runner: codex
